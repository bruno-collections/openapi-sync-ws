        - name: status
          value: shipped
          type: query
          description: Filter orders by current status
          disabled: true
        - name: status
          value: delivered
          type: query
          description: Filter orders by current status
          disabled: true
        - name: status
          value: cancelled
          type: query
          description: Filter orders by current status
          disabled: true
        - name: page
          value: "1"
          type: query
        - name: pageSize
          value: "20"
          type: query
    response:
      status: 200
      statusText: OK
