info:
  name: Get an order by ID
  type: http
  seq: 3
  tags:
    - Orders

http:
  method: GET
  url: "{{baseUrl}}/orders/:orderId"
  params:
    - name: orderId
      value: ord_1001
      type: path
      description: Unique order identifier
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Order details
    request:
      url: "{{baseUrl}}/orders/:orderId"
      method: GET
      params:
        - name: orderId
          value: ord_1001
          type: path
          description: Unique order identifier
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 404 Response
    description: Order not found
    request:
      url: "{{baseUrl}}/orders/:orderId"
      method: GET
      params:
        - name: orderId
          value: ord_1001
          type: path
          description: Unique order identifier
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "validation_error",
            "message": "Request body failed validation."
          }
