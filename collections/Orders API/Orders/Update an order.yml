info:
  name: Update an order
  type: http
  seq: 4
  tags:
    - Orders

http:
  method: PATCH
  url: "{{baseUrl}}/orders/:orderId"
  params:
    - name: orderId
      value: ord_1001
      type: path
      description: Unique order identifier
  body:
    type: json
    data: |-
      {
        "status": "pending",
        "notes": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Order updated
    request:
      url: "{{baseUrl}}/orders/:orderId"
      method: PATCH
      params:
        - name: orderId
          value: ord_1001
          type: path
          description: Unique order identifier
      body:
        type: json
        data: |-
          {
            "status": "pending",
            "notes": ""
          }
    response:
