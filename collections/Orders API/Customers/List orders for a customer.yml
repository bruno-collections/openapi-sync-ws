info:
  name: List orders for a customer
  type: http
  seq: 1
  tags:
    - Customers
    - Orders

http:
  method: GET
  url: "{{baseUrl}}/customers/:customerId/orders"
  params:
    - name: customerId
      value: ""
      type: path
      description: Unique customer identifier
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Orders for the requested customer
    request:
      url: "{{baseUrl}}/customers/:customerId/orders"
      method: GET
      params:
        - name: customerId
          value: ""
          type: path
          description: Unique customer identifier
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "data": [
              {
                "id": "ord_1001",
                "customerId": "cust_1001",
                "status": "confirmed",
                "totalAmount": 70.98,
                "createdAt": "2026-04-14T12:05:00Z"
              }
            ],
            "pagination": {
              "page": 1,
              "pageSize": 20,
              "total": 42
            }
          }
