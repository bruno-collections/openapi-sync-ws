openapi: 3.0.3
info:
  title: Orders API
  version: 1.1.0
  description: |
    Demo API spec for showcasing Bruno OpenAPI Sync.

    This updated version intentionally includes changes that Bruno can detect:
    - a new endpoint for cancelling an order
    - a new `priority` field in request and response bodies
    - an updated `status` filter with `on_hold`
    - a new `include` query parameter on GET /orders/{orderId}
servers:
  - url: https://api.demo.local/v1
    description: Demo server

tags:
  - name: System
  - name: Orders
  - name: Customers

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: orders-api
                    timestamp: '2026-04-14T14:35:00Z'

  /orders:
    get:
      tags: [Orders]
      summary: List orders
      operationId: listOrders
      parameters:
        - in: query
          name: status
          description: Filter orders by current status
          required: false
          schema:
            type: string
            enum: [pending, confirmed, on_hold, shipped, delivered, cancelled]
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A paginated list of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
    post:
      tags: [Orders]
      summary: Create an order
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
            examples:
              priorityOrder:
                value:
                  customerId: cust_1001
                  priority: high
                  items:
                    - sku: sku_espresso_beans
                      quantity: 2
                      unitPrice: 15.99
                    - sku: sku_milk_frother
                      quantity: 1
                      unitPrice: 39.0
                  notes: Leave package at front desk.
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orders/{orderId}:
    get:
      tags: [Orders]
      summary: Get an order by ID
      operationId: getOrderById
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - in: query
          name: include
          required: false
          description: Optionally include related resources in the response
          schema:
            type: string
            enum: [timeline, shipment]
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Orders]
      summary: Update an order
      operationId: updateOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderPatchRequest'
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orders/{orderId}/cancel:
    post:
      tags: [Orders]
      summary: Cancel an order
      operationId: cancelOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
            examples:
              customerRequested:
                value:
                  reason: customer_requested
                  comment: Customer asked to cancel within 10 minutes of placing the order.
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '409':
          description: Order can no longer be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /customers/{customerId}/orders:
    get:
      tags: [Customers, Orders]
      summary: List orders for a customer
      operationId: listCustomerOrders
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: string
          description: Unique customer identifier
      responses:
        '200':
          description: Orders for the requested customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'

components:
  parameters:
    OrderId:
      in: path
      name: orderId
      required: true
      description: Unique order identifier
      schema:
        type: string
        example: ord_1001

  schemas:
    HealthStatus:
      type: object
      required: [status, service, timestamp]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: orders-api
        timestamp:
          type: string
          format: date-time

    OrderListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'
        pagination:
          type: object
          required: [page, pageSize, total]
          properties:
            page:
              type: integer
              example: 1
            pageSize:
              type: integer
              example: 20
            total:
              type: integer
              example: 42

    OrderResponse:
      allOf:
        - $ref: '#/components/schemas/Order'
        - type: object
          properties:
            message:
              type: string
              example: Order retrieved successfully.

    OrderSummary:
      type: object
      required: [id, customerId, status, totalAmount, priority, createdAt]
      properties:
        id:
          type: string
          example: ord_1001
        customerId:
          type: string
          example: cust_1001
        status:
          type: string
          enum: [pending, confirmed, on_hold, shipped, delivered, cancelled]
          example: confirmed
        priority:
          type: string
          enum: [low, normal, high]
          example: high
        totalAmount:
          type: number
          format: float
          example: 70.98
        createdAt:
          type: string
          format: date-time
          example: '2026-04-14T12:05:00Z'

    Order:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          required: [items]
          properties:
            notes:
              type: string
              nullable: true
              example: Leave package at front desk.
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderItem'

    OrderItem:
      type: object
      required: [sku, quantity, unitPrice]
      properties:
        sku:
          type: string
          example: sku_espresso_beans
        quantity:
          type: integer
          minimum: 1
          example: 2
        unitPrice:
          type: number
          format: float
          example: 15.99

    OrderCreateRequest:
      type: object
      required: [customerId, priority, items]
      properties:
        customerId:
          type: string
          example: cust_1001
        priority:
          type: string
          enum: [low, normal, high]
          default: normal
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'
        notes:
          type: string
          maxLength: 500
          example: Leave package at front desk.

    OrderPatchRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, on_hold, shipped, delivered, cancelled]
        priority:
          type: string
          enum: [low, normal, high]
        notes:
          type: string
          maxLength: 500

    CancelOrderRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          enum: [customer_requested, payment_failed, fraud_suspected, inventory_unavailable]
        comment:
          type: string
          maxLength: 500

    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: validation_error
        message:
          type: string
          example: Request body failed validation.
